<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Epson Booklet</title>
    <link rel="icon" type="image/png" href="read.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="mode-switcher">
        <button id="modeKitobcha" class="mode-btn active">Kitobcha</button>
        <button id="modeOldOrqa" class="mode-btn">Old-Orqa</button>
      </div>

      <div class="window-wrapper" id="windowWrapper">
        <div class="window">
          <h1 class="appName">Kitobcha Rejimi</h1>
          <div class="numbers">
            <label>
              Birinchi betni kiriting:
              <input type="number" id="firstNumber" value="1" min="1" />
            </label>
            <label>
              Oxirgi betni kiriting:
              <input type="number" id="secondNumber" value="8" min="1" />
            </label>
          </div>
        </div>

        <div class="window">
          <h1 class="appName">Old-Orqa Rejimi</h1>
          <div class="numbers">
            <label>
              Birinchi betni kiriting:
              <input type="number" id="firstNumberTwo" value="1" min="1" />
            </label>
            <label>
              Oxirgi betni kiriting:
              <input type="number" id="secondNumberTwo" value="7" min="1" />
            </label>
          </div>
        </div>
      </div>

      <div class="btn">
        <button id="btn" class="main-action-btn">Yaratish</button>
      </div>

      <div id="resultPages">
        <div class="paper">
          <h3 id="listNumber">__</h3>
          <h3>ta list qo'ying.</h3>
        </div>

        <div class="result">
          <label>
            Orqa tomoni:
            <div class="input-group">
              <input type="text" id="back" readonly placeholder="..." />
              <button class="copy-btn" id="copyBack">Nusxalash</button>
            </div>
          </label>
          <label>
            Old tomoni:
            <div class="input-group">
              <input type="text" id="front" readonly placeholder="..." />
              <button class="copy-btn" id="copyFront">Nusxalash</button>
            </div>
          </label>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
